name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Install nbb
        run: npm install -g nbb

      - name: Run tests
        run: clojure -M:test

      - name: Lint
        run: clojure -M:lint

      - name: Safe-release evidence gate (fixtures)
        run: nbb --classpath src scripts/check-safe-release.cljs

      - name: Safe-release evidence gate (strict release enforcement)
        run: nbb --classpath src scripts/check-safe-release.cljs --release --profile research

      - name: Key-register status (advisory)
        run: nbb --classpath src scripts/check-key-register.cljs

      - name: Crypto inventory gate
        run: nbb --classpath src scripts/check-crypto-inventory.cljs

      - name: Hybrid object-encryption admit gate
        run: nbb --classpath src scripts/check-hybrid-admit.cljs

      - name: Monitoring heartbeat (collector stub, file only)
        run: nbb --classpath src scripts/monitoring-heartbeat.cljs

  # Recomputes the hybrid X25519 + ML-KEM-768 wrapping vectors with Bouncy
  # Castle (:vectors alias only; the gates job above stays BC-free).
  vectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Hybrid KEM vector recomputation
        run: clojure -M:vectors:vectors-test
