name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest

      - name: Run tests
        run: clojure -M:test

      - name: Safe-release evidence gate (fixtures + advisory)
        run: bb scripts/check-safe-release.bb

      - name: Crypto inventory gate
        run: bb scripts/check-crypto-inventory.bb

  # Recomputes the hybrid X25519 + ML-KEM-768 wrapping vectors with Bouncy
  # Castle (:vectors alias only; the gates job above stays BC-free).
  vectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Hybrid KEM vector recomputation
        run: clojure -M:vectors:vectors-test
